<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يوسف التعليمية - عرض فوري</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

    <nav><a href="index.html" class="nav-back">⬅ العودة للرئيسية</a></nav>

    <header>
        <h1>منصة يوسف التعليمية</h1>
        <p>اختر المادة ليتم جلب ملف الـ PDF وعرضه كصور فوراً</p>
    </header>

    <div class="subjects-menu">
        <button class="tab-btn" onclick="loadSubjectPDF('arabic')">اللغة العربية</button>
        <button class="tab-btn" onclick="loadSubjectPDF('math')">الرياضيات</button>
        <button class="tab-btn" onclick="loadSubjectPDF('physics')">الفيزياء</button>
    </div>

    <div id="loadingStatus" class="loading-text" style="display: none;">⏳ جاري جلب وقراءة ملف الـ PDF...</div>

    <main class="content-container">
        <div id="pdfContainer" class="pdf-viewer-container"></div>
    </main>

    <script src="js/viewer.js"></script>
</body>
</html>
